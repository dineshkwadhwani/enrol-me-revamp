<!DOCTYPE html>
<html>
  <head>
    <title>Attendance Summary Report</title>
    <link rel="stylesheet" href="../css/orgstyle.css">
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <img src="../images/icon_home.png"
             class="nav-icon"
             onclick="location.href='orgdashboard.html'">
      </div>
      <div class="profile">
        <img src="../images/icon_person.png"
             class="nav-icon"
             id="profileIcon">
        <div class="profile-menu" id="profileMenu">
          <div id="orgLogoutBtn">Logout</div>
        </div>
      </div>
    </div>

    <!-- SUMMARY NAV -->
    <div class="summary-nav">
      <img src="../images/icon_back.png"
           onclick="history.back()">
      <img src="../images/icon_run.png"
           id="runAttendanceSummaryBtn"
           class="nav-icon">
    </div>

    <!-- FILTER SECTION -->
    <div class="form-container">
      <h2>Attendance Summary Report</h2>
      <div class="field-wrapper">
        <label>Program</label>
        <select id="attendanceSummaryProgram">
          <option value="">Select Program</option>
          <option>IIT Foundation</option>
          <option>CBSE Admission 2026</option>
          <option>Maths Olympiad</option>
        </select>
        <div class="field-error-message"
             id="attendanceSummaryProgramError"></div>
      </div>
      <div class="field-wrapper">
        <label>From Date</label>
        <input type="date" id="attendanceSummaryFrom">
        <div class="field-error-message"
             id="attendanceSummaryFromError"></div>
      </div>
      <div class="field-wrapper">
        <label>To Date</label>
        <input type="date" id="attendanceSummaryTo">
        <div class="field-error-message"
             id="attendanceSummaryToError"></div>
      </div>
    </div>

    <!-- REPORT SECTION -->
    <div id="attendanceSummaryReportSection"
         class="report-section"
         style="display:none">
      <div style="text-align:right;margin-bottom:10px">
        <img src="../images/icon_export.png"
             class="nav-icon"
             id="exportAttendanceSummary">
      </div>
      <table class="report-table">
        <thead>
          <tr>
            <th>Participant Name</th>
            <th>Total Present Days</th>
          </tr>
        </thead>
        <tbody id="attendanceSummaryTableBody">
        </tbody>
      </table>
    </div>

    <div class="footer">
      © Enrol-Me 2026
    </div>

    <script src="../script/orgscript.js"></script>
  </body>
</html>
